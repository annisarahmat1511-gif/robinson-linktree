<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RobinsonL | Digital Links</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.15) 0px, transparent 50%);
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            background: rgba(30, 41, 59, 0.6);
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .profile-glow {
            box-shadow: 0 0 40px rgba(79, 70, 229, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full py-12 animate-fade-in">
        
        <div class="text-center mb-10">
            <div class="relative inline-block mb-4">
                <!-- FOTO PROFIL: Ganti src dengan link foto kamu -->
                <div class="w-28 h-28 rounded-3xl overflow-hidden profile-glow border-2 border-indigo-500/30 transform rotate-3 hover:rotate-0 transition-transform duration-500">
                    <img src="https://i.pinimg.com/736x/49/be/5c/49be5ca77d4867613eddf38c81bdca75.jpg" alt="Profile" class="w-full h-full object-cover">
                </div>
                <div class="absolute -bottom-2 -right-2 bg-green-500 w-6 h-6 rounded-full border-4 border-[#020617] flex items-center justify-center" title="Active">
                    <div class="w-2 h-2 bg-white rounded-full animate-pulse"></div>
                </div>
            </div>
            <!-- Nama diganti jadi RobinsonL -->
            <h1 class="text-3xl font-bold tracking-tight mb-2 bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">RobinsonL</h1>
            <p class="text-slate-400 text-sm px-6 italic">limited edition, not for everyone
running, lifting, healing 🏃‍♂️
”</p>
        </div>

        <div class="space-y-4">
            
            <!-- Saweria Link -->
            <a href="https://saweria.co/RobinsonL" target="_blank" class="glass-card flex items-center p-4 rounded-2xl group">
                <div class="w-12 h-12 bg-orange-500/20 text-orange-400 rounded-xl flex items-center justify-center text-xl mr-4 group-hover:bg-orange-500 group-hover:text-white transition-all">
                    <i class="fas fa-donate"></i>
                </div>
                <div class="flex-grow">
                    <h3 class="font-bold text-sm">Support Me</h3>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest font-semibold">Support Dan Donate Disini Ya!!!</p>
                </div>
                <i class="fas fa-external-link-alt text-slate-600 group-hover:text-white transition-colors"></i>
            </a>

            <!-- TikTok Link -->
            <a href="https://tiktok.com/@xemple22" target="_blank" class="glass-card flex items-center p-4 rounded-2xl group">
                <div class="w-12 h-12 bg-black text-white rounded-xl flex items-center justify-center text-xl mr-4 group-hover:bg-slate-800 transition-all border border-slate-700">
                    <i class="fab fa-tiktok"></i>
                </div>
                <div class="flex-grow">
                    <h3 class="font-bold text-sm">TikTok</h3>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest font-semibold">Ikutin Juga Tiktok Geweh</p>
                </div>
                <i class="fas fa-chevron-right text-slate-600 group-hover:text-white transition-colors"></i>
            </a>

            <!-- Discord Link -->
            <a href="https://discord.gg/GKYhc3WT" target="_blank" class="glass-card flex items-center p-4 rounded-2xl group">
                <div class="w-12 h-12 bg-blue-500/20 text-blue-400 rounded-xl flex items-center justify-center text-xl mr-4 group-hover:bg-blue-600 group-hover:text-white transition-all">
                    <i class="fab fa-discord"></i>
                </div>
                <div class="flex-grow">
                    <h3 class="font-bold text-sm">Join Our Discord</h3>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest font-semibold">Komunitas Geweh</p>
                </div>
                <i class="fas fa-chevron-right text-slate-600 group-hover:text-white transition-colors"></i>
            </a>

            <!-- Instagram Link -->
            <a href="https://instagram.com/2pac2on" target="_blank" class="glass-card flex items-center p-4 rounded-2xl group">
                <div class="w-12 h-12 bg-pink-500/20 text-pink-400 rounded-xl flex items-center justify-center text-xl mr-4 group-hover:bg-pink-600 group-hover:text-white transition-all">
                    <i class="fab fa-instagram"></i>
                </div>
                <div class="flex-grow">
                    <h3 class="font-bold text-sm">Instagram</h3>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest font-semibold">Ikutin Juga Instagram Geweh</p>
                </div>
                <i class="fas fa-chevron-right text-slate-600 group-hover:text-white transition-colors"></i>
            </a>

        </div>

        <div class="mt-12 text-center">
            <p class="text-slate-600 text-xs tracking-widest uppercase">© 2024 Powered by RobinsonL</p>
        </div>

    </div>

    <script>
        // Menambahkan interaksi klik halus
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('mousedown', () => {
                link.style.transform = 'scale(0.95)';
            });
            link.addEventListener('mouseup', () => {
                link.style.transform = 'translateY(-4px) scale(1)';
            });
        });
    </script>
</body>
</html>
